<div class="p-3">
  <div class="input-group mb-3">
    <input
      (keydown.enter)="onSearch()"
      [formControl]="queryControl"
      aria-label="Search query"
      class="form-control"
      placeholder="Search query"
      type="text"
    />
    <button (click)="onSearch()" [disabled]="queryControl.invalid" class="btn btn-primary" type="button">
      Search
    </button>
  </div>

  <h5 class="mb-3">Recent Searches</h5>
  <div class="list-group list-group-flush shadow-sm rounded">
    @for (item of history(); track item.id) {
      <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
        <div class="text-truncate me-2" title="{{ item.query }}">
          {{ item.query }}
        </div>
        <small class="text-muted text-nowrap">
          {{ item.lastSeenAt | date:'shortTime' }}
        </small>
      </div>
    } @empty {
      <div class="list-group-item text-center text-muted italic">
        No recent searches
      </div>
    }
  </div>
</div>
